  <div class="container">

```
<h1>Agenda Digital</h1>

<div class="formulario">

  <input
    type="text"
    id="nome"
    placeholder="Nome"
    autocomplete="name"
    maxlength="100"
  >

  <input
    type="text"
    id="telefone"
    placeholder="Telefone"
    autocomplete="tel"
    maxlength="20"
  >

  <input
    type="email"
    id="email"
    placeholder="E-mail"
    autocomplete="email"
    maxlength="150"
  >

  <div class="botoes">

    <button
      id="btnSalvar"
      type="button"
      onclick="salvarContato()"
    >
      Salvar
    </button>

    <button
      type="button"
      onclick="limparFormulario()"
    >
      Cancelar
    </button>

  </div>

</div>

<table>

  <thead>
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>E-mail</th>
      <th>Ações</th>
    </tr>
  </thead>

  <tbody id="listaContatos">
    <!-- Contatos carregados pelo JavaScript -->
  </tbody>

</table>
```

  </div>

<script defer src="app.js"></script>

</html>
