<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda Digital</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>📇 Gerenciamento de Contatos</h1>
            <div class="header-actions">
                <span id="usuarioLogado" class="user-tag">👤 Carregando...</span>
            </div>
        </header>

        <div class="busca-section">
            <div class="busca-container">
                <label for="buscaNome"><strong>Busca</strong></label>
                <input 
                    type="text" 
                    id="buscaNome" 
                    placeholder="Digite o nome para busca"
                    onkeyup="if(event.key === 'Enter') buscarContatos()"
                />
                <button onclick="buscarContatos()" class="btn-primary">🔍 Buscar</button>
                <button onclick="limparBusca()" class="btn-secondary">✖️ Limpar</button>
            </div>
            <button onclick="novoContato()" class="btn-success">➕ Novo</button>
        </div>

        <div class="formulario" id="formulario">
            <h2 id="formTitle">📝 Novo Contato</h2>
            
            <div class="form-group">
                <label for="nome">Nome *</label>
                <input type="text" id="nome" placeholder="Digite o nome completo" required maxlength="100" />
            </div>

            <div class="form-group">
                <label for="telefone">Telefone *</label>
                <input type="text" id="telefone" placeholder="(11) 99999-9999" required maxlength="20" />
            </div>

            <div class="form-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" placeholder="exemplo@email.com" required maxlength="150" />
            </div>

            <div class="botoes">
                <button id="btnSalvar" onclick="salvarContato()" class="btn-primary">💾 Salvar</button>
                <button onclick="limparFormulario()" class="btn-secondary">✖️ Cancelar</button>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>📋 Lista de Contatos</h2>
                <span id="contadorContatos" class="contador">0 contatos</span>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Telefone</th>
                            <th>E-mail</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaContatos">
                        <tr>
                            <td colspan="5" class="empty-state">
                                <span class="empty-icon">📭</span>
                                <span>Carregando contatos...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
